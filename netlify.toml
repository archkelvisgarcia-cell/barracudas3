[build]
  command   = ""
  publish   = "barracudas3"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Redirect /api/* → Netlify functions
[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# Redirect /admin and /admin/ to login
[[redirects]]
  from   = "/admin"
  to     = "/admin/login.html"
  status = 302

[[redirects]]
  from   = "/admin/"
  to     = "/admin/login.html"
  status = 302

# Scheduled function: check for upcoming games every hour, fires 60 min before
[functions."notify-pregame"]
  schedule = "0 * * * *"
