[build]
  command   = ""
  publish   = "barracudas3"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Redirect /api/* → Netlify functions
[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# Redirect /admin pages (no trailing slash issue)
[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 302

# Scheduled function: check for upcoming games every 30 minutes
[functions."notify-pregame"]
  schedule = "*/30 * * * *"
