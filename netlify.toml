[build]
  command   = ""
  publish   = "barracudas3"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Redirect /admin and /admin/ to login
[[redirects]]
  from   = "/admin"
  to     = "/admin/login.html"
  status = 302

[[redirects]]
  from   = "/admin/"
  to     = "/admin/login.html"
  status = 302

# Auto-pipeline: discover new games, generate articles, update stats — runs every hour
[functions."pipeline"]
  schedule = "0 * * * *"
  timeout  = 26

# Scheduled function: check for upcoming games every hour, fires 60 min before
[functions."notify-pregame"]
  schedule = "0 * * * *"
