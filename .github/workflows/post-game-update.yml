name: Post-Game Auto Update

on:
  # Runs daily at 22:00 Swiss time (CEST = UTC+2 → 20:00 UTC)
  schedule:
    - cron: '0 20 * * *'

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      force_from_id:
        description: 'Force probe from this EasyScore game ID (leave blank for auto)'
        required: false
        type: string
      dry_run:
        description: 'Dry run — check but do not commit'
        required: false
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # push commits
      issues: write     # create batting stats issue

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run post-game update script
        id: update
        env:
          EASYSCORE_API_KEY:  ${{ secrets.EASYSCORE_API_KEY }}
          EASYSCORE_TEAM_ID:  '13054'
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          FORCE_FROM_ID:      ${{ inputs.force_from_id }}
          DRY_RUN:            ${{ inputs.dry_run }}
        run: node scripts/post-game-update.js

      - name: Commit and push updated files
        if: steps.update.outputs.games_updated == 'true' && inputs.dry_run != 'true'
        run: |
          git config user.name  "BAR3 Auto-Update Bot"
          git config user.email "bot@barracudas3.netlify.app"
          git add barracudas3/app.js barracudas3/index.html barracudas3/results.html scripts/game-state.json
          git commit -m "Auto-update: ${{ steps.update.outputs.commit_message }}"
          git push origin main

      - name: Summary
        if: always()
        run: |
          echo "### Post-Game Update Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.update.outputs.summary }}" >> $GITHUB_STEP_SUMMARY
