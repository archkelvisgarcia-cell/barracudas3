<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login — Barracudas</title>
<meta name="robots" content="noindex, nofollow" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1f0f;
    color: #fff;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 20px;
  }
  .card {
    background: #111f12;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 40px 36px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .logo { width: 56px; height: 56px; margin: 0 auto 20px; }
  .logo img { width: 100%; height: 100%; object-fit: contain; }
  .title {
    font-family: 'Anton', 'Impact', sans-serif;
    font-size: 28px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .sub {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 32px;
  }
  label {
    display: block;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 7px;
    text-align: left;
  }
  input[type="password"] {
    width: 100%;
    padding: 11px 14px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    text-align: center;
    letter-spacing: 0.1em;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }
  input[type="password"]:focus { outline: none; border-color: #FFD700; }
  button {
    width: 100%;
    padding: 12px;
    background: #FFD700;
    color: #0d1f0f;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.88; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    font-size: 11px;
    color: #ff5555;
    min-height: 20px;
    margin-top: 12px;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><img src="../assets/logo.png" alt="Barracudas" /></div>
  <div class="title">Barracudas</div>
  <div class="sub">Admin Panel</div>

  <label for="pw">Admin Password</label>
  <input type="password" id="pw" placeholder="••••••••••••" autocomplete="current-password" />
  <button id="loginBtn" onclick="doLogin()">Login →</button>
  <div class="error" id="err"></div>
</div>

<script>
document.getElementById('pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

// If already authenticated with a valid token, skip the login page
(function() {
  var token = sessionStorage.getItem('admin_token');
  if (!token) return;
  try {
    var data = JSON.parse(atob(token));
    if (data.exp > Date.now()) {
      window.location.replace(data.role === 'manager' ? '/admin/lineup.html' : '/admin/index.html');
    } else {
      sessionStorage.removeItem('admin_token');
    }
  } catch(e) { sessionStorage.removeItem('admin_token'); }
})();

async function doLogin() {
  var pw  = document.getElementById('pw').value.trim();
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('err');
  if (!pw) { err.textContent = 'Enter your password.'; return; }

  btn.disabled = true;
  btn.textContent = 'Checking…';
  err.textContent = '';

  try {
    var r = await fetch('/.netlify/functions/admin-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    var data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Login failed');

    sessionStorage.setItem('admin_token', data.token);
    window.location.replace(data.role === 'manager' ? '/admin/lineup.html' : '/admin/index.html');
  } catch(e) {
    err.textContent = e.message || 'Incorrect password.';
    btn.disabled = false;
    btn.textContent = 'Login →';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}
</script>
</body>
</html>
