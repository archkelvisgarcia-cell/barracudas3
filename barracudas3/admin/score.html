<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Score Admin — Barracudas</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 40px var(--pad); max-width: 520px; margin: 0 auto; }
  .admin-card { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 32px; }
  .admin-title { font-family: var(--display); font-size: 28px; text-transform: uppercase; margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  .field label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); display: block; margin-bottom: 6px; }
  .field input, .field select {
    width: 100%; padding: 10px 14px;
    background: var(--bg-deep); border: 1px solid var(--line);
    border-radius: var(--r-sm); color: var(--ink);
    font-family: var(--mono); font-size: 14px;
  }
  .field input:focus, .field select:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .status { font-family: var(--mono); font-size: 12px; color: var(--accent); margin-top: 12px; height: 18px; }
  #loginWrap { text-align: center; padding: 60px 0; }
  #loginWrap input { width: 260px; text-align: center; }
</style>
</head>
<body>
<div class="admin-card">
  <!-- Login gate -->
  <div id="loginWrap">
    <div class="admin-title">🔐 Admin</div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pwInput" placeholder="Enter password" />
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px;" onclick="checkPw()">Enter</button>
    <p id="pwErr" style="color:#ff5555;font-family:var(--mono);font-size:11px;margin-top:8px;"></p>
  </div>

  <!-- Score panel (hidden until logged in) -->
  <div id="scorePanel" style="display:none">
    <div class="admin-title">🔴 Live Score</div>
    <div class="row2">
      <div class="field">
        <label>BAR3 Score</label>
        <input type="number" id="scoreUs" min="0" max="30" value="0" />
      </div>
      <div class="field">
        <label>Opponent Score</label>
        <input type="number" id="scoreThem" min="0" max="30" value="0" />
      </div>
    </div>
    <div class="field">
      <label>Inning / Status</label>
      <input type="text" id="inning" placeholder="e.g. Top 5th · 1 out" />
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="saveScore()">Update Live Score</button>
    <button class="btn btn-ghost" style="width:100%;margin-top:8px;" onclick="clearScore()">Clear / End Game</button>
    <div class="status" id="status"></div>
    <hr style="border-color:var(--line);margin:20px 0;" />
    <p style="font-family:var(--mono);font-size:10px;color:var(--ink-faint);">
      Score is stored in visitor's localStorage. For real-time sync across devices, connect EasyScore API (set EASYSCORE_API_KEY in Netlify env vars).
    </p>
  </div>
</div>

<script>
const PW = 'barracudas2026'; // change this
function checkPw() {
  if (document.getElementById('pwInput').value === PW) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('scorePanel').style.display = 'block';
    const s = JSON.parse(localStorage.getItem('bar3-live') || '{}');
    document.getElementById('scoreUs').value   = s.us    ?? 0;
    document.getElementById('scoreThem').value = s.them  ?? 0;
    document.getElementById('inning').value    = s.inning ?? '';
  } else {
    document.getElementById('pwErr').textContent = 'Incorrect password.';
  }
}
function saveScore() {
  const data = {
    us:     parseInt(document.getElementById('scoreUs').value) || 0,
    them:   parseInt(document.getElementById('scoreThem').value) || 0,
    inning: document.getElementById('inning').value,
    ts:     Date.now(),
  };
  localStorage.setItem('bar3-live', JSON.stringify(data));
  document.getElementById('status').textContent = '✓ Score updated — ' + new Date().toLocaleTimeString();
}
function clearScore() {
  localStorage.removeItem('bar3-live');
  document.getElementById('status').textContent = '✓ Score cleared.';
}
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });
</script>
</body>
</html>
