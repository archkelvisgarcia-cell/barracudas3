<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Score Admin — Barracudas</title>
<meta name="robots" content="noindex, nofollow" />
<script>
(function(){
  var token = sessionStorage.getItem('admin_token');
  if (!token) { window.location.replace('/admin/login.html'); return; }
  try {
    var data = JSON.parse(atob(token));
    if (data.exp < Date.now()) { sessionStorage.removeItem('admin_token'); window.location.replace('/admin/login.html'); return; }
    if (data.role !== 'admin') { window.location.replace('/admin/lineup.html'); }
  } catch(e) { sessionStorage.removeItem('admin_token'); window.location.replace('/admin/login.html'); }
})();
</script>
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 40px var(--pad); max-width: 520px; margin: 0 auto; }
  .admin-card { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 32px; }
  .admin-title { font-family: var(--display); font-size: 28px; text-transform: uppercase; margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  .field label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); display: block; margin-bottom: 6px; }
  .field input, .field select {
    width: 100%; padding: 10px 14px;
    background: var(--bg-deep); border: 1px solid var(--line);
    border-radius: var(--r-sm); color: var(--ink);
    font-family: var(--mono); font-size: 14px;
  }
  .field input:focus, .field select:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .status { font-family: var(--mono); font-size: 12px; color: var(--accent); margin-top: 12px; height: 18px; }
</style>
</head>
<body>
<button onclick="sessionStorage.removeItem('admin_token');window.location.replace('/admin/login.html');"
  style="position:fixed;top:12px;right:16px;font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.45);padding:5px 12px;border-radius:var(--r-sm);cursor:pointer;z-index:999;">
  Logout
</button>
<div class="admin-card">
  <div id="scorePanel">

    <!-- ── SECTION 1: Scoreboard Toggle ── -->
    <div class="admin-title">📺 Scoreboard</div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px;">
      <span style="font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-faint);">Visibility</span>
      <span id="sbToggleStatus" style="font-family:var(--display);font-size:22px;text-transform:uppercase;color:rgba(255,255,255,0.3);">HIDDEN</span>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
      <button class="btn btn-primary" id="btnSbOn"  onclick="setScoreboard(true)">▶ SHOW ON SITE</button>
      <button class="btn btn-ghost"   id="btnSbOff" onclick="setScoreboard(false)">■ HIDE FROM SITE</button>
      <button class="btn btn-ghost"   style="margin-left:auto;" onclick="forceRefresh()">↻ Force Refresh API</button>
    </div>
    <div class="status" id="sbStatus" style="height:auto;margin-bottom:10px;"></div>

    <div>
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:0.10em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px;">Last game data</div>
      <div id="sbPreview" style="background:var(--bg-deep);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 14px;font-family:var(--mono);font-size:11px;color:var(--ink-mute);">Loading…</div>
    </div>

    <hr style="border-color:var(--line);margin:24px 0;" />

    <!-- ── SECTION 2: Manual Override ── -->
    <div class="admin-title" style="font-size:18px;">🔴 Manual Override</div>
    <p style="font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-bottom:14px;">
      Fallback if EasyScore API is down. Stored in this browser's localStorage only.
    </p>
    <div class="row2">
      <div class="field">
        <label>BAR3 Score</label>
        <input type="number" id="scoreUs" min="0" max="30" value="0" />
      </div>
      <div class="field">
        <label>Opponent Score</label>
        <input type="number" id="scoreThem" min="0" max="30" value="0" />
      </div>
    </div>
    <div class="field">
      <label>Inning / Status</label>
      <input type="text" id="inning" placeholder="e.g. Top 5th · 1 out" />
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="saveScore()">Save Manual Score</button>
    <button class="btn btn-ghost" style="width:100%;margin-top:8px;" onclick="clearScore()">Clear Manual Score</button>
    <div class="status" id="status"></div>
  </div>
</div>

<script>
const SB_KEY = 'barracudas_scoreboard_active';

document.addEventListener('DOMContentLoaded', function() {
  const s = JSON.parse(localStorage.getItem('bar3-live') || '{}');
  document.getElementById('scoreUs').value   = s.us    ?? 0;
  document.getElementById('scoreThem').value = s.them  ?? 0;
  document.getElementById('inning').value    = s.inning ?? '';
  updateToggleUI();
  loadPreview();
});

// ── Toggle ────────────────────────────────────────────────────
function updateToggleUI() {
  // null/unset = VISIBLE (default ON); only 'false' hides it
  const hidden = localStorage.getItem(SB_KEY) === 'false';
  const statusEl = document.getElementById('sbToggleStatus');
  statusEl.textContent = hidden ? 'HIDDEN' : 'VISIBLE';
  statusEl.style.color = hidden ? 'rgba(255,255,255,0.3)' : 'var(--accent)';
  document.getElementById('btnSbOn').style.opacity  = hidden ? '0.5' : '1';
  document.getElementById('btnSbOff').style.opacity = hidden ? '1' : '0.5';
}

function setScoreboard(active) {
  // ON = remove key (default) or set 'true'; OFF = set 'false' to force-hide
  if (active) localStorage.removeItem(SB_KEY);
  else localStorage.setItem(SB_KEY, 'false');
  updateToggleUI();
  const el = document.getElementById('sbStatus');
  el.style.color = active ? 'var(--accent)' : 'rgba(255,255,255,0.45)';
  el.textContent = active
    ? '✓ Scoreboard is now visible on the site.'
    : '✓ Scoreboard is now hidden from the site.';
}

// ── Force Refresh ─────────────────────────────────────────────
async function forceRefresh() {
  const el = document.getElementById('sbStatus');
  el.style.color = 'rgba(255,255,255,0.45)';
  el.textContent = '↻ Fetching from EasyScore…';
  try {
    const r = await fetch('/.netlify/functions/easyscore?_=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    el.style.color = 'var(--accent)';
    el.textContent = '✓ Data refreshed · ' + new Date().toLocaleTimeString();
    renderPreview(data.live || data.recent || null);
  } catch (e) {
    el.style.color = '#ff5555';
    el.textContent = '✗ ' + e.message;
  }
}

// ── Preview ───────────────────────────────────────────────────
function renderPreview(g) {
  const el = document.getElementById('sbPreview');
  if (!g) { el.textContent = 'No game data available.'; return; }
  const date = g.date
    ? new Date(g.date).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
    : '';
  const badge = g.live ? '🔴 LIVE' : g.finished ? '✓ FINAL' : 'UPCOMING';
  const inn   = g.lineScore?.innings ? ' · INN ' + g.lineScore.innings : '';
  el.innerHTML =
    `<strong style="color:var(--ink)">${g.bar3Abbr || 'BAR3'}&nbsp;${g.bar3Score ?? 0}&nbsp;—&nbsp;${g.oppScore ?? 0}&nbsp;${g.oppAbbr || 'OPP'}</strong>` +
    `&nbsp;&nbsp;<span style="color:var(--accent)">${badge}</span>` +
    (date ? `&nbsp;·&nbsp;${date}` : '') + inn +
    (g.oppName ? `<br><span style="color:rgba(255,255,255,0.35);font-size:10px;">vs ${g.oppName}</span>` : '');
}

async function loadPreview() {
  try {
    const r = await fetch('/.netlify/functions/easyscore');
    if (!r.ok) throw new Error();
    const data = await r.json();
    renderPreview(data.live || data.recent || null);
  } catch {
    document.getElementById('sbPreview').textContent = 'Could not load game data.';
  }
}

// ── Manual score ──────────────────────────────────────────────
function saveScore() {
  const data = {
    us:     parseInt(document.getElementById('scoreUs').value) || 0,
    them:   parseInt(document.getElementById('scoreThem').value) || 0,
    inning: document.getElementById('inning').value,
    ts:     Date.now(),
  };
  localStorage.setItem('bar3-live', JSON.stringify(data));
  document.getElementById('status').textContent = '✓ Manual score saved — ' + new Date().toLocaleTimeString();
}

function clearScore() {
  localStorage.removeItem('bar3-live');
  document.getElementById('status').textContent = '✓ Manual score cleared.';
}

</script>
</body>
</html>
